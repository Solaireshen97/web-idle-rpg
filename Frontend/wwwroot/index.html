<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web Idle RPG - Frontend</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <h1>Web Idle RPG</h1>
  <p>Minimal idle RPG — fight, rest, level up.</p>

  <section>
    <h2>Create Player</h2>
    <input id="playerName" type="text" placeholder="player name" />
    <button id="createPlayerButton" type="button">Create</button>
  </section>

  <section>
    <h2>Load Player</h2>
    <input id="playerId" type="number" min="1" value="1" />
    <button id="loadPlayerButton" type="button">Load</button>
  </section>

  <section>
    <h2>Player Status</h2>
    <div class="status-grid">
      <span class="label">Id</span><span id="playerStatusId">-</span>
      <span class="label">Name</span><span id="playerStatusName">-</span>
      <span class="label">Level</span><span id="playerStatusLevel">-</span>
      <span class="label">EXP</span><span id="playerStatusExperience">-</span>
      <span class="label">Gold</span><span id="playerStatusGold">-</span>
      <span class="label">Attack</span><span id="playerStatusAttack">-</span>
      <span class="label">HP</span><span id="playerStatusCurrentHp">-</span>
      <span class="label">Max HP</span><span id="playerStatusMaxHp">-</span>
      <span class="label">Created</span><span id="playerStatusCreatedAt">-</span>
      <span class="label">Updated</span><span id="playerStatusUpdatedAt">-</span>
    </div>
  </section>

  <section>
    <h2>Current Enemy</h2>
    <div class="status-grid">
      <span class="label">Name</span><span id="currentEnemyName">No active enemy</span>
      <span class="label">HP</span><span id="currentEnemyHp">-</span>
      <span class="label">Attack</span><span id="currentEnemyAttack">-</span>
    </div>
  </section>

  <section>
    <h2>Actions</h2>
    <button id="fightButton" type="button">Fight</button>
    <button id="restButton" type="button">Rest</button>
    <button id="addGoldButton" type="button">Add +10 Gold</button>
  </section>

  <section>
    <h2>Last Result</h2>
    <div id="fightResult">No action yet.</div>
  </section>

  <details>
    <summary>Debug JSON</summary>
    <pre id="result">No player loaded.</pre>
  </details>

  <script src="/app.js"></script>
</body>
</html>
